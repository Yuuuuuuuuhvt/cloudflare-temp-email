name: Upstream Sync

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    permissions:
      contents: read

    steps:
      - name: Verify sync token
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::Repository secret SYNC_TOKEN is required with Contents and Workflows write permissions."
            exit 1
          fi

      - name: Sync upstream changes
        run: gh repo sync ${{ github.repository }} --source dreamhunter2333/cloudflare_temp_email --branch main
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
